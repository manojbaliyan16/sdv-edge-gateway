# sdv-edge-gateway configuration
# Loaded at runtime by main.cpp

device:
  uin: "VIN_PLACEHOLDER"           # Vehicle Identification Number — set per device
  region: "eu"

can:
  interface_tx: "can0"             # Transmit interface (CAN simulator → can0)
  interface_rx: "can1"             # Receive interface (gateway reads can1)
  bitrate: 500000
  dbc_path: "dbc/toyota_corolla.dbc"
  # Signals to decode — filter from full DBC (200+ signals → 5 used)
  signals:
    - VEHICLE_SPEED
    - ENGINE_RPM
    - ENGINE_COOLANT_TEMP
    - BATTERY_VOLTAGE
    - GEAR_SHIFT

mqtt:
  broker: "YOUR_ENDPOINT.iot.eu-west-1.amazonaws.com"
  port: 8883
  client_id: "sdv-gateway-VIN_PLACEHOLDER"
  keep_alive_sec: 60
  # Topics — sdv/<channel>/from|to/uin/<UIN>
  topic_telemetry_up:   "sdv/telemetry/from/uin/VIN_PLACEHOLDER"
  topic_command_in:     "sdv/commands/to/uin/VIN_PLACEHOLDER"
  topic_command_status: "sdv/commands/from/uin/VIN_PLACEHOLDER/status"
  topic_ota_manifest:   "sdv/ota/to/uin/VIN_PLACEHOLDER/manifest"
  topic_ota_status:     "sdv/ota/from/uin/VIN_PLACEHOLDER/status"

tls:
  ca_cert:     "certs/AmazonRootCA1.pem"
  device_cert: "certs/device.pem.crt"
  device_key:  "certs/private.pem.key"

telemetry:
  publish_interval_ms: 1000        # Publish every 1 second
  offline_db_path: "buffer.db"
  offline_max_rows: 10000          # Max rows to buffer before dropping oldest

anomaly:
  model_path: "/opt/sdv/anomaly_detector.onnx"   # built by tools/train_anomaly_model.py
  threshold: 0.85                                  # score > this fires an MQTT alert

ota:
  firmware_dir: "/tmp/ota_staging"
  active_slot: "A"                 # A/B partition
  preconditions:
    max_speed_kmh: 0               # Vehicle must be stopped
    min_battery_v: 11.5
    min_free_storage_mb: 50
  public_key_path: "certs/ota_verify.pem"  # ECDSA public key for firmware signature
